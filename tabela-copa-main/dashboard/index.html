
<!DOCTYPE html>
<html>
<head>
    <title>World Cup Dashboard</title>
</head>
<body>
    <h1>Probabilidades em Tempo Real</h1>
    <div id="data"></div>

    <script>
        async function load() {
            const res = await fetch("http://localhost:8000/predictions");
            const data = await res.json();

            document.getElementById("data").innerHTML =
                data.map(d =>
                    `<p>${d.match_id} | Team1: ${d.team_1_win} | Draw: ${d.draw} | Team2: ${d.team_2_win}</p>`
                ).join("");
        }

        load();
    </script>
</body>
</html>
