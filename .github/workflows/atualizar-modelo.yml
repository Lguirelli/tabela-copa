name: Atualizar modelo da Copa

on:
  workflow_dispatch:
  push:
    paths:
      - 'data/entrada/**'
      - 'data/resultados_reais.csv'
      - 'data/desempenho_*.csv'
      - 'data/matches.csv'
      - 'data/database/**'
      - 'scripts/**'
      - 'neural_copa/**'
      - 'requirements.txt'
      - '.github/workflows/atualizar-modelo.yml'
  schedule:
    # Roda diariamente às 09:00 no horário de Brasília (12:00 UTC).
    # Este agendamento recalcula com os dados já versionados no repositório.
    - cron: '0 12 * * *'

permissions:
  contents: write

concurrency:
  group: atualizar-modelo-copa
  cancel-in-progress: true

jobs:
  recalcular:
    runs-on: ubuntu-latest

    steps:
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=." >> $GITHUB_ENV

      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install "pandas>=2.0,<3" "numpy>=1.24,<3"
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Validar integridade antes do recálculo
        run: python scripts/testes/test_integridade_dados.py

      - name: Recalcular resultados, rede neural e probabilidades
        run: python -m worldcup.pipeline

      - name: Validar recálculo
        run: python scripts/validar_recalculo_probabilidades.py

      - name: Validar integridade após o recálculo
        run: python scripts/testes/test_integridade_dados.py

      - name: Verificar arquivos derivados alterados
        id: diff
        shell: bash
        run: |
          # O commit automático deve ser restrito a artefatos derivados.
          # Mudanças de código, docs, workflow ou dependências devem entrar apenas via commit manual.
          git add \
            data/entrada/novos_resultados.csv \
            data/resultados_reais.csv \
            data/resultados.csv \
            data/resultados.txt \
            data/matches.csv \
            data/database/matches.csv \
            data/matches.json \
            data/modelo_diario/ \
            data/rede_neural/ \
            src/data.js \
            src/modelo-diario-data.js \
            src/rede-neural-data.js \
            VALIDACAO_RECALCULO_PROBABILIDADES_*.json

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Nenhuma alteração derivada gerada pelo recálculo."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --cached --stat
          fi

      - name: Commitar arquivos recalculados
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: recalcula modelo e probabilidades da Copa [skip ci]"
          git push
