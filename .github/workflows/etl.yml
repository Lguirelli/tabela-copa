
name: ETL Pipeline

on:
  push:
    paths:
      - 'ingestion/**'
      - 'data/**'
  schedule:
    - cron: '0 6 * * *'

jobs:
  run-etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python -m ingestion.main
