name: Daily World Cup Data Update

on:
  schedule:
    # Roda todo dia às 09:20 UTC. Ajuste se quiser outro horário.
    - cron: '20 9 * * *'
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Dias anteriores para verificar'
        required: false
        default: '5'
      all_past:
        description: 'Verificar todas as datas passadas da tabela'
        required: false
        default: 'false'


permissions:
  contents: write

jobs:
  update-finished-games:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-daily.txt

      - name: Run daily no-key extractor
        run: |
          if [ "${{ github.event.inputs.all_past }}" = "true" ]; then
            python scripts/daily_extract_finished_matches.py --repo-root . --all-past --delay-seconds 3
          else
            DAYS_BACK="${{ github.event.inputs.days_back }}"
            if [ -z "$DAYS_BACK" ]; then DAYS_BACK=5; fi
            python scripts/daily_extract_finished_matches.py --repo-root . --days-back "$DAYS_BACK" --days-forward 0 --delay-seconds 3
          fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/resultados.csv data/resultados_reais.csv data/database/matches.csv data/daily_updates/ data/mappings/ || true
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): daily finished World Cup update"
            git push
          fi
